name: Java CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  checkstyle:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 11 for Checkstyle
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Download Checkstyle
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path tools | Out-Null
        Invoke-WebRequest -Uri "https://github.com/checkstyle/checkstyle/releases/download/checkstyle-13.4.2/checkstyle-13.4.2-all.jar" -OutFile "tools\checkstyle.jar"

    - name: Run Checkstyle
      shell: cmd
      run: |
        java -jar tools\checkstyle.jar -c google_checks.xml -f plain src\main\java src\test\java

  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        
    - name: Create output directory
      run: mkdir bin

    - name: Download Dependencies
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar" -OutFile "lib\junit-platform-console-standalone-1.10.2.jar"

    - name: Copy Resources
      run: |
        xcopy /s /e /i /y data bin\data
        xcopy /s /e /i /y images bin\images

    - name: Compile Source Code
      shell: cmd
      run: |
        dir /s /b src\main\java\*.java > sources.txt
        javac -source 8 -target 8 -d bin -cp "lib\*" -encoding UTF-8 @sources.txt

    - name: Compile Test Code
      shell: cmd
      run: |
        dir /s /b src\test\java\*.java > test_sources.txt
        javac -source 8 -target 8 -d bin -cp "bin;lib\*" -encoding UTF-8 @test_sources.txt

    - name: Run Tests
      shell: cmd
      run: |
        java -Djava.awt.headless=true -Xmx1024m -cp ".;lib\junit-platform-console-standalone-1.10.2.jar;bin;lib\*" org.junit.platform.console.ConsoleLauncher --scan-classpath=bin --reports-dir=test-results
